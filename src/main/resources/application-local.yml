spring:
  application:
    name: QueroLerVersao02
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/db_quero_ler_v2
    username: postgres
    password: postgres

  flyway:
    enabled: true
    clean-disabled: false
    baseline-on-migrate: false
    #    clean-on-validation-error: true
    locations: classpath:db/migration

api:
  security:
    token:
      secret: ${API_SECURITY_TOKEN_SECRET:quero-ler-secret-local-com-32-char!}
      issuer: quero_ler
      expiration-minutes: 120
